name: Weekly Digest Automation

on:
  schedule:
    # Runs every Monday at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: '3.11'

jobs:
  weekly-digest:
    name: Generate Weekly Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Create data directory
        run: mkdir -p data

      - name: Decode OAuth token
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: echo "$GOOGLE_TOKEN_JSON" > token.json

      - name: Run Weekly Digest
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_DOCS_DOC_ID: ${{ secrets.GOOGLE_DOCS_DOC_ID }}
        run: python -m scripts.weekly_digest

      - name: Upload pulse artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-${{ github.run_number }}
          path: data/weekly_pulse.json
          retention-days: 30
